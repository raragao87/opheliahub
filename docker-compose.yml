services:
  postgres:
    image: postgres:16-alpine
    container_name: opheliahub-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ophelia
      POSTGRES_PASSWORD: ophelia_dev
      POSTGRES_DB: opheliahub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ophelia -d opheliahub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
